<script>
    function showToast(message) {
        let container = document.getElementById('toast-container');
        if(!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            document.body.appendChild(container);
        }
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `✓ ${message}`;
        container.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    const glow = document.getElementById('touchGlow');
    function moveGlow(e) {
        let x, y;
        if (e.touches && e.touches.length > 0) {
            x = e.touches[0].clientX;
            y = e.touches[0].clientY;
        } else {
            x = e.clientX;
            y = e.clientY;
        }
        requestAnimationFrame(() => {
            glow.style.transform = `translate(${x}px, ${y}px)`;
        });
    }
    document.addEventListener('touchstart', (e) => { glow.classList.add('active'); moveGlow(e); }, {passive: true});
    document.addEventListener('touchmove', (e) => moveGlow(e), {passive: true});
    document.addEventListener('touchend', () => glow.classList.remove('active'));
    document.addEventListener('mousemove', (e) => { glow.classList.add('active'); moveGlow(e); });
    document.addEventListener('mouseleave', () => glow.classList.remove('active'));

    function addToCart() {

        };
        let item = cart.find(i => i.codigo === p.codigo);
        if(item) {
            item.cantidad += 1;
        } else {
            cart.push({ ...p, cantidad: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        showToast('BASTIDOR LIFE 3 MOD. añadido al carrito');
    }
    function shareProduct() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ url: url }).catch(console.error);
        } else {
            navigator.clipboard.writeText(url);
            alert('¡Enlace copiado al portapapeles!');
        }
    }
</script>
