* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: radial-gradient(circle at 50% 35%, #352012 0%, #180c06 35%, #050302 65%, #000000 100%); background-attachment: fixed; color: #ffffff; font-family: 'Arial', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
h1, h2, h3, h4, h5, h6, .section-title, .products-title { font-family: 'Georgia', serif; }
/* EFECTO DE ILUMINACIÓN DE FONDO (TOUCH-GLOW) */
.touch-glow { position: fixed; top: 0; left: 0; width: 400px; height: 400px; margin-top: -200px; margin-left: -200px; border-radius: 50%; background: radial-gradient(circle, rgba(196, 139, 92, 0.25) 0%, rgba(196, 139, 92, 0.05) 40%, rgba(0,0,0,0) 70%); pointer-events: none; z-index: 1; opacity: 0; transition: opacity 0.5s ease; will-change: transform, opacity; }
.touch-glow.active { opacity: 1; }
header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; z-index: 50; background-color: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
.nav-inicio { color: #b3b3b3; text-decoration: none; font-size: 11px; font-weight: normal; letter-spacing: 0.5px; transition: color 0.3s ease; display: flex; align-items: center; }
.nav-inicio:hover { color: #ffffff; }
nav ul { list-style: none; display: flex; align-items: center; gap: 25px; }
nav ul li { display: flex; align-items: center; }
nav ul li a { color: #b3b3b3; text-decoration: none; font-size: 11px; letter-spacing: 0.5px; transition: color 0.3s ease; display: flex; align-items: center; }
nav ul li a:hover { color: #ffffff; }
.icon-instagram { width: 18px; height: 18px; fill: #b3b3b3; transition: fill 0.3s ease; }
.icon-instagram:hover { fill: #ffffff; }

.products-section { width: 100%; max-width: 1200px; padding: 80px 20px 40px 20px; flex-grow: 1; display:flex; flex-direction: column; align-items: center; }
.products-header { margin-bottom: 50px; text-align: center; }
.products-title { font-family: 'Georgia', serif; font-size: 28px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: #ffffff; }

.categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; width: 100%; max-width: 1000px; }

.category-card { 
    position: relative; 
    border-radius: 12px; 
    overflow: hidden; 
    aspect-ratio: 1 / 1; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    text-decoration: none; 
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    border: 1px solid #333;
    background-color: #1a1a1a;
}

.category-card:hover { 
    transform: translateY(-8px) scale(1.02); 
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8); 
    border-color: #c48b5c; 
}

.category-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0.5;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.category-card:hover .category-bg {
    opacity: 0.7;
    transform: scale(1.1);
}

.category-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 100%);
}

.category-title {
    position: relative;
    z-index: 10;
    font-family: 'Georgia', serif;
    font-size: 24px;
    font-weight: bold;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    transition: transform 0.3s ease;
}

.category-card:hover .category-title {
    transform: scale(1.05);
}

footer { width: 100%; background-color: rgba(0, 0, 0, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; z-index: 30; }
footer p { margin: 0; color: #888888; font-size: 10px; text-align: center; font-family: 'Arial', sans-serif; }
footer a { color: #c48b5c; text-decoration: none; transition: color 0.3s ease; }
footer a:hover { color: #ffffff; }

.btn-ver-todos { background-color: #c48b5c; color: #ffffff; border: none; padding: 14px 28px; font-size: 11px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: background-color 0.3s ease, transform 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-radius: 4px; font-family: 'Arial', sans-serif;}
.btn-ver-todos:hover { background-color: #a87245; transform: scale(1.02); }
@media (max-width: 768px) { 
    header { flex-direction: row; justify-content: center; align-items: center; padding: 20px 10px; gap: 15px; flex-wrap: wrap; }

    .products-section { padding-top: 40px; }
    .categories-grid { gap: 20px; }
    .category-title { font-size: 20px; }
}

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const glow = document.getElementById('touchGlow');
        function moveGlow(e) {
            let x, y;
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            requestAnimationFrame(() => {
                glow.style.transform = `translate(${x}px, ${y}px)`;
            });
        }
        document.addEventListener('touchstart', (e) => { glow.classList.add('active'); moveGlow(e); }, {passive: true});
        document.addEventListener('touchmove', (e) => moveGlow(e), {passive: true});
        document.addEventListener('touchend', () => glow.classList.remove('active'));
        document.addEventListener('mousemove', (e) => { glow.classList.add('active'); moveGlow(e); });
        document.addEventListener('mouseleave', () => glow.classList.remove('active'));
    });
</script>
